<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ドーナツ工場ERP</title>
<style>
/* ===== リセット・基本 ===== */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',Meiryo,sans-serif;font-size:14px;background:#fdf6ee;color:#333}
h2{font-size:16px;font-weight:bold;margin-bottom:12px;color:#5a3e1b}
h3{font-size:14px;font-weight:bold;margin:10px 0 6px;color:#7a5230}

/* ===== ヘッダ ===== */
#header{background:#c0651a;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:12px}
#header h1{font-size:18px;font-weight:bold;letter-spacing:.05em}

/* ===== タブナビ ===== */
#tabnav{display:flex;background:#e8d5b7;border-bottom:2px solid #c0651a;overflow-x:auto}
.tab-btn{flex:none;padding:10px 18px;background:none;border:none;cursor:pointer;font-size:14px;color:#5a3e1b;font-weight:bold;border-bottom:3px solid transparent;white-space:nowrap}
.tab-btn:hover{background:#f5e6cc}
.tab-btn.active{border-bottom-color:#c0651a;background:#fdf6ee;color:#c0651a}

/* ===== コンテンツ ===== */
#main{padding:16px;max-width:1200px}
.tab-content{display:none}
.tab-content.active{display:block}

/* ===== フォーム部品 ===== */
label{display:inline-block;margin-right:6px;color:#5a3e1b;font-weight:bold}
input[type=text],input[type=number],input[type=date],input[type=password],select,textarea{
  padding:5px 8px;border:1px solid #c9a87a;border-radius:4px;font-size:13px;background:#fff}
input:focus,select:focus,textarea:focus{outline:none;border-color:#c0651a}
.form-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}

/* ===== ボタン ===== */
.btn{padding:6px 14px;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-weight:bold}
.btn-primary{background:#c0651a;color:#fff}.btn-primary:hover{background:#a0521a}
.btn-secondary{background:#e8d5b7;color:#5a3e1b}.btn-secondary:hover{background:#d4b896}
.btn-danger{background:#c0392b;color:#fff}.btn-danger:hover{background:#a03020}
.btn-sm{padding:3px 8px;font-size:12px}
.btn-print{background:#2e7d32;color:#fff}.btn-print:hover{background:#1b5e20}

/* ===== テーブル ===== */
.tbl-wrap{overflow-x:auto;margin-bottom:12px}
table{border-collapse:collapse;min-width:100%;font-size:13px}
th{background:#e8d5b7;color:#5a3e1b;padding:6px 10px;text-align:left;border:1px solid #c9a87a;white-space:nowrap}
td{padding:5px 8px;border:1px solid #d4c4a8;vertical-align:top}
tr:nth-child(even){background:#fef9f2}
tr:hover{background:#f5e6cc}
td input[type=number],td input[type=text]{width:100%;border:1px solid #c9a87a;padding:3px 5px;border-radius:3px}

/* ===== 作業確認カード ===== */
.work-section{margin-bottom:20px}
.work-card{background:#fff;border:1px solid #c9a87a;border-radius:6px;margin-bottom:12px;padding:12px}
.work-card-header{font-weight:bold;color:#5a3e1b;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #e8d5b7;display:flex;justify-content:space-between;align-items:baseline}
.work-card-header .sub{font-size:12px;color:#888;font-weight:normal}
.recipe-list{list-style:none;padding-left:8px}
.recipe-list li{padding:2px 0;display:flex;justify-content:space-between}
.recipe-list li .ing-name{color:#333}
.recipe-list li .ing-qty{font-weight:bold;color:#c0651a;min-width:80px;text-align:right}
.fixed-badge{display:inline-block;background:#f39c12;color:#fff;font-size:11px;padding:1px 6px;border-radius:10px;margin-left:6px}

/* ===== 生産計画マトリクス ===== */
.plan-matrix th.product-col{min-width:80px;text-align:center}
.plan-matrix td.qty-cell{text-align:center;padding:3px}
.plan-matrix td.qty-cell input{width:60px;text-align:center}
.plan-matrix td.date-cell{background:#f5e6cc;font-weight:bold;white-space:nowrap}
.plan-matrix td.store-cell{white-space:nowrap}
.edit-mode-notice{background:#fff3cd;border:1px solid #ffc107;padding:8px 12px;border-radius:4px;margin-bottom:10px;font-size:13px}
.warning-text{color:#c0392b;font-size:12px;font-weight:bold;margin:6px 0}

/* ===== 在庫推移 ===== */
.shortage{color:#c0392b;font-weight:bold}

/* ===== モーダル ===== */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:8px;padding:24px;min-width:280px;max-width:500px;width:90%}
.modal-title{font-size:15px;font-weight:bold;margin-bottom:14px;color:#5a3e1b}
.modal-footer{margin-top:16px;display:flex;gap:8px;justify-content:flex-end}

/* ===== サブタブ（マスタ管理） ===== */
.subtab-nav{display:flex;gap:4px;margin-bottom:12px;border-bottom:1px solid #c9a87a;padding-bottom:4px}
.subtab-btn{padding:5px 14px;border:1px solid #c9a87a;border-radius:4px 4px 0 0;background:#e8d5b7;cursor:pointer;font-size:13px;font-weight:bold;color:#5a3e1b}
.subtab-btn.active{background:#fff;border-bottom-color:#fff;margin-bottom:-1px;color:#c0651a}
.subtab-content{display:none}.subtab-content.active{display:block}

/* ===== メッセージ ===== */
.msg-area{min-height:20px;margin-bottom:8px;font-size:13px}
.msg-ok{color:#2e7d32}.msg-err{color:#c0392b}

/* ===== ローディング ===== */
.loading{color:#888;font-style:italic;padding:20px 0}

/* ===== 印刷用 ===== */
@media print{
  #header,#tabnav,#print-work-btn,.btn,.subtab-nav,.form-row,#modal-overlay,
  .no-print{display:none!important}
  body{background:#fff;font-size:12px}
  .tab-content{display:block!important}
  .tab-content:not(.active){display:none!important}
  .work-card{break-inside:avoid;border:1px solid #999}
  table{font-size:11px}
  th,td{border:1px solid #999;padding:3px 6px}
}
</style>
</head>
<body>

<div id="header">
  <h1>🍩 ドーナツ工場ERP</h1>
</div>

<div id="tabnav">
  <button class="tab-btn active" onclick="showTab('work')">作業確認</button>
  <button class="tab-btn" onclick="showTab('plan')">生産計画</button>
  <button class="tab-btn" onclick="showTab('order')">発注管理</button>
  <button class="tab-btn" onclick="showTab('inventory')">在庫管理</button>
  <button class="tab-btn" onclick="showTab('masters')">マスタ管理</button>
  <button class="tab-btn" onclick="showTab('cost')">原価確認</button>
</div>

<div id="main">

<!-- ============================
     作業確認タブ
     ============================ -->
<div id="tab-work" class="tab-content active">
  <h2>作業確認</h2>
  <div class="form-row no-print">
    <label>作業日</label>
    <input type="date" id="work-date">
    <button class="btn btn-primary" onclick="loadWorkSchedule()">表示</button>
    <button class="btn btn-print" onclick="window.print()">🖨 印刷</button>
  </div>
  <div id="msg-work" class="msg-area"></div>
  <div id="work-result"></div>
</div>

<!-- ============================
     生産計画タブ
     ============================ -->
<div id="tab-plan" class="tab-content">
  <h2>生産計画</h2>
  <div class="form-row no-print">
    <label>表示期間</label>
    <input type="date" id="plan-start"> 〜
    <input type="date" id="plan-end">
    <button class="btn btn-primary" onclick="loadPlan()">表示</button>
  </div>
  <div class="form-row no-print">
    <button class="btn btn-secondary" onclick="enterEditMode()">✏️ 編集モード</button>
    <button class="btn btn-secondary" id="plan-save-btn" onclick="savePlan()" style="display:none">💾 保存</button>
    <button class="btn btn-secondary" id="plan-add-row-btn" onclick="addPlanRow()" style="display:none">＋ 行追加</button>
    <button class="btn btn-secondary" onclick="exportPlan()">↑ エクスポート</button>
    <button class="btn btn-secondary" onclick="importPlan()">↓ インポート</button>
  </div>
  <p class="warning-text no-print">⚠️ インポートは、必ず事前に最新をエクスポートしてから行ってください。</p>
  <div id="msg-plan" class="msg-area"></div>
  <div id="plan-result"></div>
</div>

<!-- ============================
     発注管理タブ
     ============================ -->
<div id="tab-order" class="tab-content">
  <h2>発注管理</h2>
  <div class="form-row">
    <label>作業日 期間</label>
    <input type="date" id="order-start"> 〜
    <input type="date" id="order-end">
    <button class="btn btn-primary" onclick="loadOrderSummary()">集計</button>
  </div>
  <div id="msg-order" class="msg-area"></div>
  <div id="order-result"></div>
</div>

<!-- ============================
     在庫管理タブ
     ============================ -->
<div id="tab-inventory" class="tab-content">
  <h2>在庫管理</h2>
  <div class="form-row no-print">
    <button class="btn btn-primary" onclick="loadInventory()">最新読込</button>
    <button class="btn btn-secondary" onclick="saveInventory()">💾 在庫保存</button>
  </div>
  <div id="msg-inv" class="msg-area"></div>
  <div id="inventory-result"></div>
  <hr style="margin:16px 0">
  <h3>在庫推移シミュレーション</h3>
  <div class="form-row">
    <label>期間</label>
    <input type="date" id="proj-start"> 〜
    <input type="date" id="proj-end">
    <button class="btn btn-secondary" onclick="loadProjection()">計算</button>
  </div>
  <div id="projection-result"></div>
</div>

<!-- ============================
     マスタ管理タブ
     ============================ -->
<div id="tab-masters" class="tab-content">
  <h2>マスタ管理</h2>
  <div class="subtab-nav">
    <button class="subtab-btn active" onclick="showSubtab('m-ingredient')">原料マスタ</button>
    <button class="subtab-btn" onclick="showSubtab('m-store')">店舗マスタ</button>
    <button class="subtab-btn" onclick="showSubtab('m-product')">商品マスタ</button>
    <button class="subtab-btn" onclick="showSubtab('m-recipe')">レシピマスタ</button>
    <button class="subtab-btn" onclick="showSubtab('m-fixed-recipe')">固定レシピ</button>
  </div>

  <!-- 原料マスタ -->
  <div id="m-ingredient" class="subtab-content active">
    <div class="form-row">
      <button class="btn btn-primary btn-sm" onclick="openIngredientModal()">＋ 追加</button>
      <button class="btn btn-secondary btn-sm" onclick="loadMasters()">再読込</button>
    </div>
    <div id="msg-m-ing" class="msg-area"></div>
    <div id="ingredient-list" class="tbl-wrap"></div>
  </div>

  <!-- 店舗マスタ -->
  <div id="m-store" class="subtab-content">
    <div class="form-row">
      <button class="btn btn-primary btn-sm" onclick="openStoreModal()">＋ 追加</button>
    </div>
    <div id="msg-m-store" class="msg-area"></div>
    <div id="store-list" class="tbl-wrap"></div>
  </div>

  <!-- 商品マスタ -->
  <div id="m-product" class="subtab-content">
    <div class="form-row">
      <button class="btn btn-primary btn-sm" onclick="openProductModal()">＋ 追加</button>
    </div>
    <div id="msg-m-prod" class="msg-area"></div>
    <div id="product-list" class="tbl-wrap"></div>
  </div>

  <!-- レシピマスタ -->
  <div id="m-recipe" class="subtab-content">
    <div class="form-row">
      <button class="btn btn-primary btn-sm" onclick="openRecipeModal()">＋ 追加</button>
    </div>
    <p style="font-size:12px;color:#666;margin-bottom:8px">
      ※ 作業日：出荷日から何日前に作業するか（0=出荷当日）
    </p>
    <div id="msg-m-recipe" class="msg-area"></div>
    <div id="recipe-list" class="tbl-wrap"></div>
  </div>

  <!-- 固定レシピ -->
  <div id="m-fixed-recipe" class="subtab-content">
    <div class="form-row">
      <button class="btn btn-primary btn-sm" onclick="openFixedRecipeModal()">＋ 追加</button>
    </div>
    <p style="font-size:12px;color:#666;margin-bottom:8px">
      ※ 固定表示の半製品（商品マスタで「固定表示=TRUE」に設定）のレシピを登録します。
    </p>
    <div id="msg-m-fixed" class="msg-area"></div>
    <div id="fixed-recipe-list" class="tbl-wrap"></div>
  </div>
</div>

<!-- ============================
     原価確認タブ
     ============================ -->
<div id="tab-cost" class="tab-content">
  <h2>原価確認</h2>
  <div class="form-row">
    <button class="btn btn-primary" onclick="loadCost()">計算</button>
  </div>
  <div id="msg-cost" class="msg-area"></div>
  <div id="cost-result"></div>
</div>

</div><!-- #main -->

<!-- ============================
     モーダル
     ============================ -->
<div id="modal-overlay" class="modal-overlay" onclick="closeModalOnBg(event)">
  <div class="modal-box" id="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-footer" id="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" id="modal-ok" onclick="">OK</button>
    </div>
  </div>
</div>

<!-- パスワードモーダル -->
<div id="pw-modal-overlay" class="modal-overlay" onclick="closePwModalOnBg(event)">
  <div class="modal-box">
    <div class="modal-title">管理者パスワード</div>
    <div>
      <input type="password" id="pw-input" placeholder="パスワードを入力" style="width:100%;margin-bottom:8px" onkeydown="if(event.key==='Enter')confirmPassword()">
      <div id="pw-error" style="color:#c0392b;font-size:12px;min-height:16px"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closePwModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="confirmPassword()">確認</button>
    </div>
  </div>
</div>

<script>
// ================================================================
// GAS API 設定
// ================================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw8UVbYjBo1ouXXV-LQb8wqGgrYxF5-dApjkUZV6qxert4KnHJQNLQGq9CGW_JZm9P8/exec';

const GET_ACTIONS = new Set([
  'getAllMasterData', 'getProductionPlan', 'getWorkSchedule',
  'getInventory', 'getInventoryProjection', 'getOrderSummary', 'getCostByProduct'
]);

async function gasCall(action, ...args) {
  const params = buildApiParams(action, args);

  if (GET_ACTIONS.has(action)) {
    const qs = new URLSearchParams({ action, ...params }).toString();
    const r  = await fetch(GAS_URL + '?' + qs);
    const d  = await r.json();
    if (d.status === 'error') throw new Error(d.message);
    return d.result;
  } else {
    const r = await fetch(GAS_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body:    'payload=' + encodeURIComponent(JSON.stringify({ action, ...params }))
    });
    const d = await r.json();
    if (d.status === 'error') throw new Error(d.message);
    return d.result;
  }
}

function buildApiParams(action, args) {
  switch (action) {
    case 'getAllMasterData':
    case 'getInventory':
    case 'getCostByProduct':
      return {};
    case 'getProductionPlan':
    case 'getOrderSummary':
    case 'getInventoryProjection':
      return { start: args[0], end: args[1] };
    case 'getWorkSchedule':
      return { workDate: args[0] };
    case 'saveIngredient':
    case 'saveStore':
    case 'saveProduct':
    case 'saveRecipe':
    case 'saveFixedRecipe':
      return { data: args[0] };
    case 'deleteIngredient':
    case 'deleteStore':
    case 'deleteProduct':
    case 'deleteRecipe':
    case 'deleteFixedRecipe':
      return { id: args[0] };
    case 'saveProductionPlanItems':
      return { items: args[0], password: args[1] };
    case 'deleteProductionPlanItems':
      return { ids: args[0], password: args[1] };
    case 'exportProductionPlan':
      return {};
    case 'importProductionPlan':
      return { password: args[0] };
    case 'updateInventoryItem':
      return { ingredientId: args[0], quantity: args[1] };
    case 'verifyPassword':
      return { password: args[0] };
    default:
      return {};
  }
}

// ================================================================
// アプリ状態
// ================================================================
const App = {
  masters: { ingredients:[], stores:[], products:[], recipes:[], fixedRecipes:[] },
  adminPassword: null,
  planEditMode: false,
  planData: [],
  planProducts: [],
  pwCallback: null
};

// ================================================================
// 初期化
// ================================================================
document.addEventListener('DOMContentLoaded', () => {
  setDefaultDates();
  loadMasters();
});

function setDefaultDates() {
  const today    = fmtDate(new Date());
  const nextWeek = fmtDate(new Date(Date.now() + 7*86400000));
  const nextMonth= fmtDate(new Date(Date.now() + 30*86400000));

  q('#work-date').value  = today;
  q('#plan-start').value = today;
  q('#plan-end').value   = nextWeek;
  q('#order-start').value= today;
  q('#order-end').value  = nextWeek;
  q('#proj-start').value = today;
  q('#proj-end').value   = nextMonth;
}

// ================================================================
// ユーティリティ
// ================================================================
const q  = s => document.querySelector(s);
const qa = s => document.querySelectorAll(s);

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDateJp(s) {
  if (!s) return '';
  const [y,m,d] = s.split('-');
  return `${y}/${m}/${d}`;
}
function showMsg(elId, msg, isError=false) {
  const el = q('#'+elId);
  if (!el) return;
  el.textContent = msg;
  el.className = 'msg-area ' + (isError ? 'msg-err' : 'msg-ok');
}
function setLoading(elId, text='読込中...') {
  const el = q('#'+elId);
  if (el) el.innerHTML = `<p class="loading">${text}</p>`;
}

// ================================================================
// タブ管理
// ================================================================
function showTab(name) {
  qa('.tab-btn').forEach(b => b.classList.remove('active'));
  qa('.tab-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  q('#tab-'+name).classList.add('active');

  if (name === 'masters')   loadMasters();
  if (name === 'cost')      loadCost();
  if (name === 'inventory') loadInventory();
}

function showSubtab(name) {
  qa('.subtab-btn').forEach(b => b.classList.remove('active'));
  qa('.subtab-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  q('#'+name).classList.add('active');
}

// ================================================================
// マスタ管理
// ================================================================
async function loadMasters() {
  try {
    const data = await gasCall('getAllMasterData');
    App.masters = data;
    renderIngredientList();
    renderStoreList();
    renderProductList();
    renderRecipeList();
    renderFixedRecipeList();
  } catch(e) { showMsg('msg-m-ing','読込エラー: '+e.message, true); }
}

// ---- 原料マスタ ----
function renderIngredientList() {
  let html = `<table><tr><th>表示順</th><th>原料名</th><th>仕入先</th><th>原価(円/g)</th><th class="no-print">操作</th></tr>`;
  App.masters.ingredients.forEach(r => {
    html += `<tr>
      <td>${r.display_order}</td><td>${esc(r.name)}</td>
      <td>${esc(r.supplier)}</td><td>${r.unit_cost}</td>
      <td class="no-print">
        <button class="btn btn-secondary btn-sm" onclick='openIngredientModal(${JSON.stringify(r)})'>編集</button>
        <button class="btn btn-danger btn-sm" onclick="deleteIngredient('${r.id}')">削除</button>
      </td></tr>`;
  });
  q('#ingredient-list').innerHTML = html + '</table>';
}

function openIngredientModal(data={}) {
  showModal('原料マスタ 編集', `
    <div class="form-row"><label>原料名</label><input id="f-ing-name" value="${esc(data.name||'')}"></div>
    <div class="form-row"><label>仕入先</label><input id="f-ing-supplier" value="${esc(data.supplier||'')}"></div>
    <div class="form-row"><label>原価(円/g)</label><input type="number" id="f-ing-cost" step="0.01" value="${data.unit_cost||0}"></div>
    <div class="form-row"><label>表示順</label><input type="number" id="f-ing-order" value="${data.display_order||0}"></div>
  `, async () => {
    const obj = { id:data.id||'', name:q('#f-ing-name').value.trim(), supplier:q('#f-ing-supplier').value.trim(), unit_cost:q('#f-ing-cost').value, display_order:q('#f-ing-order').value };
    if (!obj.name) return alert('原料名を入力してください');
    try { await gasCall('saveIngredient', obj); closeModal(); showMsg('msg-m-ing','保存しました'); await loadMasters(); }
    catch(e) { showMsg('msg-m-ing','エラー: '+e.message, true); }
  });
}

async function deleteIngredient(id) {
  if (!confirm('削除しますか？')) return;
  try { await gasCall('deleteIngredient', id); showMsg('msg-m-ing','削除しました'); await loadMasters(); }
  catch(e) { showMsg('msg-m-ing','エラー: '+e.message, true); }
}

// ---- 店舗マスタ ----
function renderStoreList() {
  let html = `<table><tr><th>表示順</th><th>店舗名</th><th class="no-print">操作</th></tr>`;
  App.masters.stores.forEach(r => {
    html += `<tr><td>${r.display_order}</td><td>${esc(r.name)}</td>
      <td class="no-print">
        <button class="btn btn-secondary btn-sm" onclick='openStoreModal(${JSON.stringify(r)})'>編集</button>
        <button class="btn btn-danger btn-sm" onclick="deleteStore('${r.id}')">削除</button>
      </td></tr>`;
  });
  q('#store-list').innerHTML = html + '</table>';

function renderRecipeList() {
  const { products, recipes } = App.masters;
  const prodMap = {};
  products.forEach(p => { prodMap[p.id] = p.name; });

  const grouped = {};
  recipes.forEach(r => { if (!grouped[r.parent_id]) grouped[r.parent_id] = []; grouped[r.parent_id].push(r); });

  let html = `<table><tr><th>親（商品/半製品）</th><th>子（原料/半製品）</th><th>種別</th><th>重量(g)</th><th>作業日(日前)</th><th>表示順</th><th class="no-print">操作</th></tr>`;
  products.forEach(p => {
    if (!grouped[p.id]) return;
    grouped[p.id].sort((a,b)=>Number(a.display_order||0)-Number(b.display_order||0)).forEach(r => {
      const childName = r.child_type==='原料'
        ? (App.masters.ingredients.find(i=>i.id===r.child_id)?.name||r.child_id)
        : (prodMap[r.child_id]||r.child_id);
      html += `<tr>
        <td>${esc(prodMap[r.parent_id]||r.parent_id)}</td><td>${esc(childName)}</td>
        <td>${esc(r.child_type)}</td><td>${r.weight}</td><td>${r.work_days_before}</td><td>${r.display_order}</td>
        <td class="no-print">
          <button class="btn btn-secondary btn-sm" onclick='openRecipeModal(${JSON.stringify(r)})'>編集</button>
          <button class="btn btn-danger btn-sm" onclick="deleteRecipe('${r.id}')">削除</button>
        </td></tr>`;
    });
  });
  q('#recipe-list').innerHTML = html + '</table>';
}

function buildProductOptions(selected='') {
  const { products } = App.masters;
  let opts = '<option value="">-- 選択 --</option>';
  products.forEach(p => { opts += `<option value="${p.id}" ${p.id===selected?'selected':''}>${esc(p.name)}（${p.type}）</option>`; });
  return opts;
}

function buildChildOptions(selected='', childType='') {
  const { products, ingredients } = App.masters;
  let opts = '<option value="">-- 選択 --</option>';
  if (!childType || childType==='半製品') {
    opts += '<optgroup label="半製品">';
    products.filter(p=>p.type==='半製品').forEach(p => { opts += `<option value="${p.id}" ${p.id===selected?'selected':''}>${esc(p.name)}</option>`; });
    opts += '</optgroup>';
  }
  if (!childType || childType==='原料') {
    opts += '<optgroup label="原料">';
    ingredients.forEach(i => { opts += `<option value="${i.id}" ${i.id===selected?'selected':''}>${esc(i.name)}</option>`; });
    opts += '</optgroup>';
  }
  return opts;
}

async function loadWorkSchedule() {
  const workDate = q('#work-date').value;
  if (!workDate) { showMsg('msg-work','作業日を選択してください', true); return; }
  setLoading('work-result','作業内容を計算中...');
  showMsg('msg-work','');

  catch(e) { showMsg('msg-work','エラー: '+e.message, true); q('#work-result').innerHTML=''; }
}

function renderWorkSchedule(data) {
  const { workDate, dailyItems, fixedItems } = data;
  let html = `<h3>作業日：${fmtDateJp(workDate)}</h3>`;

  if (!dailyItems.length && !fixedItems.length) {
    html += '<p style="color:#888;padding:12px">この作業日の作業はありません。</p>';
    q('#work-result').innerHTML = html; return;
  }

  if (dailyItems.length) {
    html += '<div class="work-section"><h3>■ 通常作業</h3>';
    dailyItems.forEach(item => {
      if (item.type === 'semi_product') {
        html += `<div class="work-card"><div class="work-card-header">
          <span>${esc(item.itemName)}</span>
          <span class="sub">出荷日: ${fmtDateJp(item.shippingDate)} ／ 必要量: <strong>${fmtGrams(item.totalNeededGrams)}</strong></span>
          </div><ul class="recipe-list">`;
        item.recipe.forEach(r => { html += `<li><span class="ing-name">${esc(r.childName)}</span><span class="ing-qty">${fmtGrams(r.scaledWeight)}</span></li>`; });
        html += `</ul></div>`;
      } else {
        html += `<div class="work-card"><div class="work-card-header">
          <span>${esc(item.itemName)}<span class="fixed-badge">原料</span></span>
          <span class="sub">出荷日: ${fmtDateJp(item.shippingDate)}</span>
          </div><ul class="recipe-list">
          <li><span class="ing-name">${esc(item.itemName)}</span><span class="ing-qty">${fmtGrams(item.totalNeededGrams)}</span></li>
          </ul></div>`;
      }
    });
    html += '</div>';
  }

  if (fixedItems.length) {
    html += '<div class="work-section"><h3>■ 固定レシピ（まとめ製造品）</h3>';
    fixedItems.forEach(item => {
      html += `<div class="work-card"><div class="work-card-header">
        <span>${esc(item.itemName)}<span class="fixed-badge">固定</span></span>
        <span class="sub">作業日は現場判断</span></div><ul class="recipe-list">`;
      item.recipe.forEach(r => { html += `<li><span class="ing-name">${esc(r.childName)}</span><span class="ing-qty">${fmtGrams(r.weight)}</span></li>`; });
      html += `</ul></div>`;
    });
    html += '</div>';
  }
  q('#work-result').innerHTML = html;
}

function fmtGrams(g) {
  const n = Number(g||0);
  return n >= 1000 ? (n/1000).toFixed(2).replace(/\.?0+$/,'') + ' kg' : n + ' g';
}

let planEditPassword = null;

async function loadPlan() {
  const start = q('#plan-start').value, end = q('#plan-end').value;
  if (!start || !end) { showMsg('msg-plan','期間を選択してください', true); return; }
  setLoading('plan-result','生産計画を読込中...');
  showMsg('msg-plan','');
  try {
    const data = await gasCall('getProductionPlan', start, end);
    App.planData     = data;
    App.planProducts = App.masters.products.filter(p => p.type === '商品');
    renderPlanMatrix(data, App.planProducts, App.planEditMode);
  } catch(e) { showMsg('msg-plan','エラー: '+e.message, true); }
}

function renderPlanMatrix(planData, products, editable) {
  if (!products.length) { q('#plan-result').innerHTML = '<p style="color:#888">商品マスタに商品が登録されていません。</p>'; return; }

  const pairSet = new Set();
  planData.forEach(p => { pairSet.add(p.shipping_date + '|||' + p.store_id); });

  const dataMap = {};
  planData.forEach(p => { dataMap[p.shipping_date+'|'+p.store_id+'|'+p.product_id] = p; });

  const pairs    = [...pairSet].sort();
  const storeMap = {};
  App.masters.stores.forEach(s => { storeMap[s.id] = s.name; });

  let html = editable ? `<div class="edit-mode-notice">✏️ 編集モード有効 — 数量を編集後「保存」を押してください</div>` : '';
  html += `<div class="tbl-wrap"><table class="plan-matrix"><thead><tr><th>出荷日</th><th>店舗</th>`;
  products.forEach(p => { html += `<th class="product-col">${esc(p.name)}</th>`; });
  html += `</tr></thead><tbody>`;

  pairs.forEach(pair => {
    const [date, storeId] = pair.split('|||');
    html += `<tr><td class="date-cell">${fmtDateJp(date)}</td><td class="store-cell">${esc(storeMap[storeId]||storeId)}</td>`;
    products.forEach(p => {
      const rec = dataMap[date+'|'+storeId+'|'+p.id];
      const val = rec ? (rec.quantity||'') : '';
      const id  = rec ? rec.id : '';
      html += editable
        ? `<td class="qty-cell"><input type="number" min="0" data-date="${date}" data-store="${storeId}" data-product="${p.id}" data-id="${id}" value="${val}" style="width:60px"></td>`
        : `<td class="qty-cell">${val}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  q('#plan-result').innerHTML = html;
}

function enterEditMode() {
  if (App.planEditMode) return;
  openPwModal(pw => {
    planEditPassword    = pw;
    App.planEditMode    = true;
    q('#plan-save-btn').style.display    = '';
    q('#plan-add-row-btn').style.display = '';
    renderPlanMatrix(App.planData, App.planProducts, true);
    showMsg('msg-plan','編集モードになりました');
  });
}

function addPlanRow() {
  const storeOpts = App.masters.stores.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');
  showModal('行追加（出荷日・店舗）', `
    <div class="form-row"><label>出荷日</label><input type="date" id="f-plan-date"></div>
    <div class="form-row"><label>店舗</label><select id="f-plan-store"><option value="">-- 選択 --</option>${storeOpts}</select></div>
  `, () => {
    const date = q('#f-plan-date').value, storeId = q('#f-plan-store').value;
    if (!date || !storeId) return alert('出荷日と店舗を選択してください');
    const exists = App.planData.some(p => p.shipping_date===date && p.store_id===storeId);
    if (!exists) App.planProducts.forEach(p => { App.planData.push({ id:'', shipping_date:date, store_id:storeId, product_id:p.id, quantity:0 }); });
    closeModal();
    renderPlanMatrix(App.planData, App.planProducts, true);
  });
}

async function savePlan() {
  if (!planEditPassword) return;
  const inputs  = qa('#plan-result input[type=number]');
  const toSave  = [], toDelete = [];

  inputs.forEach(inp => {
    const qty = Number(inp.value||0), id = inp.dataset.id||'';
    if (qty > 0) toSave.push({ id, shipping_date:inp.dataset.date, store_id:inp.dataset.store, product_id:inp.dataset.product, quantity:qty });
    else if (id) toDelete.push(id);
  });

  showMsg('msg-plan','保存中...');
  try {
    if (toSave.length)   await gasCall('saveProductionPlanItems', toSave, planEditPassword);
    if (toDelete.length) await gasCall('deleteProductionPlanItems', toDelete, planEditPassword);
    showMsg('msg-plan','保存しました');
    App.planEditMode = false; planEditPassword = null;
    q('#plan-save-btn').style.display = 'none';
    q('#plan-add-row-btn').style.display = 'none';
    await loadPlan();
  } catch(e) { showMsg('msg-plan','エラー: '+e.message, true); }
}

async function exportPlan() {
  showMsg('msg-plan','エクスポート中...');
  try {
    const res = await gasCall('exportProductionPlan');
    showMsg('msg-plan',`エクスポート完了（${res.count}件）。スプレッドシートの「${res.sheetName}」シートを確認してください。`);
    if (res.url) window.open(res.url, '_blank');
  } catch(e) { showMsg('msg-plan','エラー: '+e.message, true); }
}

function importPlan() {
  if (!confirm('インポートすると現在の生産計画が上書きされます。\n必ず事前にエクスポートしてから実行してください。\n続けますか？')) return;
  openPwModal(async pw => {
    showMsg('msg-plan','インポート中...');
    try { const res = await gasCall('importProductionPlan', pw); showMsg('msg-plan',`インポート完了（${res.count}件）`); await loadPlan(); }
    catch(e) { showMsg('msg-plan','エラー: '+e.message, true); }
  });
}

      <td>${r.last_updated}</td></tr>`;
  });
  q('#inventory-result').innerHTML = html + '</table></div>';
}

async function saveInventory() {
  const inputs = qa('#inventory-result input[type=number]');
  showMsg('msg-inv','保存中...');
  try {
    for (const inp of inputs) await gasCall('updateInventoryItem', inp.dataset.id, Number(inp.value));
    showMsg('msg-inv','在庫を保存しました');
    await loadInventory();
  } catch(e) { showMsg('msg-inv','エラー: '+e.message, true); }
}

async function loadProjection() {
  const start = q('#proj-start').value, end = q('#proj-end').value;
  if (!start || !end) return;
  setLoading('projection-result','推移を計算中...');
  try { renderProjection(await gasCall('getInventoryProjection', start, end)); }
  catch(e) { q('#projection-result').innerHTML = '<p class="msg-err">エラー: '+esc(e.message)+'</p>'; }
}

function renderProjection(data) {
  if (!data.length) { q('#projection-result').innerHTML = '<p style="color:#888">対象期間に作業はありません。</p>'; return; }
  let html = '<div class="tbl-wrap"><table><tr><th>作業日</th><th>原料名</th><th>消費量</th><th>消費前在庫</th><th>消費後在庫</th></tr>';
  data.forEach(day => {
    day.items.forEach(item => {
      html += `<tr class="${item.shortage?'shortage':''}">
        <td>${fmtDateJp(day.date)}</td><td>${esc(item.ingredient_name)}</td>
        <td>${fmtGrams(item.consumption)}</td><td>${fmtGrams(item.stock_before)}</td>
        <td class="${item.shortage?'shortage':''}">${fmtGrams(item.stock_after)}${item.shortage?' ⚠️不足':''}</td></tr>`;
    });
  });
  q('#projection-result').innerHTML = html + '</table></div>';
}

// ================================================================
// 原価確認
// ================================================================
async function loadCost() {
  setLoading('cost-result','原価を計算中...'); showMsg('msg-cost','');
  try { renderCost(await gasCall('getCostByProduct')); }
  catch(e) { showMsg('msg-cost','エラー: '+e.message, true); }
}

function renderCost(data) {
  if (!data.length) { q('#cost-result').innerHTML = '<p style="color:#888">商品が登録されていません。</p>'; return; }
  let html = '';
  data.forEach(prod => {
    html += `<div class="work-card" style="margin-bottom:12px">
      <div class="work-card-header">
        <span>${esc(prod.product_name)}</span>
        <span class="sub">原価合計: <strong>${prod.total_cost.toLocaleString()} 円</strong></span>
      </div>
      <table style="width:100%"><tr><th>原料名</th><th>使用量(g)</th><th>原価(円/g)</th><th>金額(円)</th></tr>`;
    prod.breakdown.forEach(b => { html += `<tr><td>${esc(b.ingredient_name)}</td><td>${b.grams}</td><td>${b.unit_cost}</td><td>${b.cost.toLocaleString()}</td></tr>`; });
    html += '</table></div>';
  });
  q('#cost-result').innerHTML = html;
}

// ================================================================
// パスワードモーダル
// ================================================================
function openPwModal(callback) {
  App.pwCallback = callback;
  q('#pw-input').value = '';
  q('#pw-error').textContent = '';
  q('#pw-modal-overlay').classList.add('show');
  setTimeout(() => q('#pw-input').focus(), 100);
}
function closePwModal() { q('#pw-modal-overlay').classList.remove('show'); App.pwCallback = null; }
function closePwModalOnBg(e) { if (e.target===q('#pw-modal-overlay')) closePwModal(); }

async function confirmPassword() {
  const pw = q('#pw-input').value;
  try {
    const ok = await gasCall('verifyPassword', pw);
    if (ok) { closePwModal(); if (App.pwCallback) App.pwCallback(pw); }
    else q('#pw-error').textContent = 'パスワードが正しくありません';
  } catch(e) { q('#pw-error').textContent = 'エラー: ' + e.message; }
}

// ================================================================
// 汎用モーダル
// ================================================================
let _modalOkFn = null;

function showModal(title, body, onOk) {
  _modalOkFn = onOk;
  q('#modal-title').textContent = title;
  q('#modal-body').innerHTML    = body;
  q('#modal-ok').onclick = () => { if (_modalOkFn) _modalOkFn(); };
  q('#modal-overlay').classList.add('show');
}
function closeModal() { q('#modal-overlay').classList.remove('show'); _modalOkFn = null; }
function closeModalOnBg(e) { if (e.target===q('#modal-overlay')) closeModal(); }

// ================================================================
// XSSエスケープ
// ================================================================
function esc(s) {
  if (s===null||s===undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
